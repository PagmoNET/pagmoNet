name: Publish (Pagmo.NET)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0-beta.6) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Build and inject natives but skip GitHub Release and NuGet push'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Resolve the version once for every downstream job ─────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manual="${{ github.event.inputs.version }}"
          v="${manual:-$tag}"
          if [ -z "$v" ]; then echo "Could not resolve a version" >&2; exit 1; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

  # ── Build the base native for every RID + pack the base .nupkg (shared) ────
  base:
    needs: meta
    uses: ./.github/workflows/_build-base-dotnet.yml
    with:
      version: ${{ needs.meta.outputs.version }}

  # ── Clean-room gate: consume the published-shaped package, no dev tools ────
  cleanroom:
    needs: [meta, base]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: macos-14
            rid: osx-arm64
          # No osx-x64 clean-room leg: GitHub's Intel macOS runners are scarce/queue-limited, and the
          # x64 slice is cross-compiled + shipped by the build. Native-Intel RUNTIME validation is
          # deferred (manual / a 1.0.x point release if an Intel-only issue ever surfaces).
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download base-package
        uses: actions/download-artifact@v4
        with:
          name: base-package
          path: localfeed

      - name: Configure clean-room to see ONLY the local feed
        working-directory: pagmo.NET/cleanroom
        shell: bash
        run: |
          cat > nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="localfeed" value="../../localfeed" />
            </packageSources>
          </configuration>
          EOF

      - name: Add package + run NLopt solve (no LD/DYLD hints)
        working-directory: pagmo.NET/cleanroom
        shell: bash
        run: |
          dotnet add CleanRoom.csproj package Pagmo.NET --version "${{ needs.meta.outputs.version }}"
          dotnet run --project CleanRoom.csproj -c Release -r ${{ matrix.rid }} --self-contained false

  # ── Publish: only after the clean-room gate passes ────────────────────────
  publish:
    needs: [meta, base, cleanroom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download base-package
        uses: actions/download-artifact@v4
        with:
          name: base-package
          path: nuget/

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "nuget/Pagmo.NET.${{ needs.meta.outputs.version }}.nupkg" \
            "nuget/Pagmo.NET.${{ needs.meta.outputs.version }}.snupkg" \
            --title "Pagmo.NET ${{ github.ref_name }}" \
            --notes-file pagmo.NET/CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to NuGet.org
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          dotnet nuget push "nuget/Pagmo.NET.${{ needs.meta.outputs.version }}.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
