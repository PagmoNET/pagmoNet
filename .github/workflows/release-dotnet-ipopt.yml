name: Publish (Pagmo.NET.Ipopt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0-beta.6) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Build, bundle, pack and clean-room test, but skip GitHub Release and NuGet push'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Pagmo.NET.Ipopt ships a SELF-CONTAINED native package: each platform job builds the
# IPOPT-enabled wrapper and bundles its full dynamic dependency closure
# (IPOPT/MUMPS/OpenBLAS/gfortran on macOS+Windows; fully static on Linux) into
# runtimes/<rid>/native. The pack job assembles all RIDs into one .nupkg, and the
# clean-room gate proves that package works on a machine with no dev tools or conda
# before anything is published.

jobs:

  # ── Resolve the version once for every downstream job ─────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manual="${{ github.event.inputs.version }}"
          v="${manual:-$tag}"
          if [ -z "$v" ]; then echo "Could not resolve a version" >&2; exit 1; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

  # ── Windows native: build IPOPT wrapper + bundle conda DLL closure ────────
  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install SWIG
        run: choco install swig --yes
        shell: pwsh

      - name: Regenerate IPOPT-enabled C# bindings
        run: pwsh pagmo.NET/createSwigWrappersAndPlaceThem.ps1 -WithIpopt
        shell: pwsh

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth 1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            ~/AppData/Local/vcpkg/archives
          key: vcpkg-windows-dotnet-ipopt-v2-${{ hashFiles('ports/**', 'native/CMakeLists.txt') }}
          restore-keys: vcpkg-windows-dotnet-ipopt-v2-

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT (Windows via conda-forge)
        run: |
          micromamba create -c conda-forge -p C:\ipopt-env ipopt -y
          echo "IPOPT_PREFIX=C:\ipopt-env\Library" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Build native with IPOPT
        env:
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/ports
        run: pwsh scripts/build-native.ps1 -Configuration Release -WithIpopt
        shell: pwsh

      - name: Bundle native + dependency closure
        run: |
          pwsh scripts/bundle-native-deps.ps1 `
            -WrapperPath native/win-build/PagmoWrapper.dll `
            -OutputDir staged/runtimes/win-x64/native `
            -SearchDir C:\ipopt-env\Library\bin
        shell: pwsh

      - name: Upload native-win-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: staged/

  # ── Linux native: fully static, self-contained .so ───────────────────────
  native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential swig curl zip unzip tar \
            autoconf autoconf-archive automake libtool libmumps-seq-dev

      - name: Regenerate IPOPT-enabled C# bindings
        run: pwsh pagmo.NET/createSwigWrappersAndPlaceThem.ps1 -WithIpopt

      - name: Install PowerShell
        run: |
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg/installed
            ~/.cache/vcpkg/archives
          key: vcpkg-linux-dotnet-ipopt-${{ hashFiles('ports/**', 'native/CMakeLists.txt') }}
          restore-keys: vcpkg-linux-dotnet-ipopt-

      - name: Build native with IPOPT
        env:
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/ports
        run: pwsh scripts/build-native.ps1 -Configuration Release -WithIpopt

      - name: Bundle native (static — copy through)
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -WrapperPath "$PWD/native/build/libPagmoWrapper.so" \
            -OutputDir "$PWD/staged/runtimes/linux-x64/native"

      - name: Upload native-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: staged/

  # ── macOS native (per-arch): build IPOPT wrapper + bundle conda dylib closure
  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            rid: osx-arm64
          - runner: macos-13   # Intel
            rid: osx-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install build tools
        run: brew install autoconf autoconf-archive automake libtool swig powershell micromamba

      - name: Install MUMPS and IPOPT (macOS via conda-forge)
        run: |
          micromamba create -c conda-forge -p $HOME/mumps-env mumps-seq ipopt -y
          echo "MUMPS_PREFIX=$HOME/mumps-env" >> $GITHUB_ENV
          echo "IPOPT_PREFIX=$HOME/mumps-env" >> $GITHUB_ENV
          sudo mkdir -p /usr/local/lib
          for lib in "$HOME/mumps-env/lib/lib"*mumps*.dylib \
                     "$HOME/mumps-env/lib/libpord"*.dylib \
                     "$HOME/mumps-env/lib/libipopt"*.dylib; do
            [ -f "$lib" ] || continue
            base=$(basename "$lib")
            sudo ln -sf "$lib" "/usr/local/lib/$base"
            noseq="${base/_seq/}"
            [ "$noseq" != "$base" ] && sudo ln -sf "$lib" "/usr/local/lib/$noseq"
          done
          SDK=$(xcrun --show-sdk-path 2>/dev/null || true)
          if [ -n "$SDK" ] && [ ! -f "$SDK/usr/lib/libm.tbd" ]; then
            printf '--- !tapi-tbd\ntbd-version: 4\ntargets: [ arm64-apple-macos14.0, x86_64-apple-macos14.0 ]\ninstall-name: /usr/lib/libm.dylib\n...\n' \
              | sudo tee "$SDK/usr/lib/libm.tbd" > /dev/null 2>&1 || true
          fi

      - name: Regenerate IPOPT-enabled C# bindings
        run: pwsh pagmo.NET/createSwigWrappersAndPlaceThem.ps1 -WithIpopt

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg/installed
            ~/.cache/vcpkg/archives
          key: vcpkg-${{ matrix.rid }}-dotnet-ipopt-v3-${{ hashFiles('ports/**', 'native/CMakeLists.txt') }}
          restore-keys: vcpkg-${{ matrix.rid }}-dotnet-ipopt-v3-

      - name: Build native with IPOPT
        env:
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/ports
        run: pwsh scripts/build-native.ps1 -Configuration Release -WithIpopt

      - name: Bundle native + dependency closure (@loader_path + ad-hoc sign)
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -WrapperPath "$PWD/native/build/libPagmoWrapper.dylib" \
            -OutputDir "$PWD/staged/runtimes/${{ matrix.rid }}/native" \
            -SearchDir "$HOME/mumps-env/lib"

      - name: Verify nothing resolves outside the package dir
        run: |
          dir="$PWD/staged/runtimes/${{ matrix.rid }}/native"
          for f in "$dir"/*.dylib; do
            echo "== $f =="
            otool -L "$f"
            if otool -L "$f" | tail -n +2 | grep -E '(mumps-env|/opt/homebrew|/usr/local|vcpkg)'; then
              echo "ERROR: $f still references a build-tree path above" >&2
              exit 1
            fi
          done

      - name: Upload native-${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: staged/

  # ── Pack: assemble all RIDs into one self-contained .nupkg ────────────────
  pack:
    needs: [meta, native-windows, native-linux, native-macos]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install SWIG + PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Regenerate IPOPT-enabled C# bindings (managed compile only)
        run: pwsh pagmo.NET/createSwigWrappersAndPlaceThem.ps1 -WithIpopt

      - name: Download all platform natives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: staged-runtimes
          merge-multiple: true

      - name: Show assembled native tree
        run: find staged-runtimes -type f | sort

      - name: Pack
        run: |
          dotnet pack pagmo.NET.ipopt/Pagmo.NET.Ipopt.csproj -c Release \
            -p:Version=${{ needs.meta.outputs.version }} \
            -p:PagmoNativePackDir="$PWD/staged-runtimes" \
            -o artifacts

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/Pagmo.NET.Ipopt.*.nupkg

  # ── Clean-room gate: consume the published-shaped package, no dev tools ────
  cleanroom:
    needs: [meta, pack]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: macos-14
            rid: osx-arm64
          - runner: macos-13
            rid: osx-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: localfeed

      - name: Configure clean-room to see ONLY the local feed
        working-directory: pagmo.NET.ipopt/cleanroom
        shell: bash
        run: |
          cat > nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="localfeed" value="../../localfeed" />
            </packageSources>
          </configuration>
          EOF

      - name: Add package + run IPOPT solve (no conda, no LD/DYLD hints)
        working-directory: pagmo.NET.ipopt/cleanroom
        shell: bash
        run: |
          dotnet add CleanRoom.csproj package Pagmo.NET.Ipopt --version "${{ needs.meta.outputs.version }}"
          dotnet run --project CleanRoom.csproj -c Release -r ${{ matrix.rid }} --self-contained false

  # ── Publish: only after the clean-room gate passes ────────────────────────
  publish:
    needs: [meta, pack, cleanroom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/Pagmo.NET.Ipopt.${{ needs.meta.outputs.version }}.nupkg \
            --title "Pagmo.NET.Ipopt ${{ github.ref_name }}" \
            --notes-file pagmo.NET.ipopt/CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to NuGet.org
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          dotnet nuget push artifacts/Pagmo.NET.Ipopt.${{ needs.meta.outputs.version }}.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
