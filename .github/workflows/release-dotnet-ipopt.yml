name: Publish (Pagmo.NET.Ipopt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0-beta.6) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Build, bundle, pack and clean-room test, but skip GitHub Release and NuGet push'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Pagmo.NET.Ipopt is a PURE, EPL-2.0 NATIVE PAYLOAD: it ships libipopt and its dependency
# closure (MUMPS/OpenBLAS/gfortran runtime) laid out under runtimes/<rid>/native, and NOTHING
# else. No pagmo, no managed code, no PagmoWrapper -- the base Pagmo.NET package carries the
# `ipopt` algorithm, which loads this libipopt at runtime via dlopen (deferred_ipopt). So this
# release builds NO native wrapper and needs NO vcpkg/IPOPT toolchain: each platform job just
# assembles conda-forge's libipopt closure (bundle-native-deps.ps1), the pack job packs it into
# one .nupkg, and the clean-room gate proves base + companion together solve HS71 on a machine
# with no dev tools and no conda.
#
# SELF-CONTAINED / OFFLINE GATE: the clean-room proves base + companion together, so it needs a
# real base package. Rather than require the base to be published first, this workflow builds the
# base in the same run via the shared _build-base-dotnet.yml reusable workflow and stages it into a
# local feed alongside the companion. The clean-room's nuget.config points at ONLY that local feed
# (no NuGet.org), so a dry-run publishes nothing yet still proves the whole stack end-to-end.
# (nomkl forces OpenBLAS instead of MKL: ~42 MB vs ~570 MB, under NuGet's 250 MB per-package limit.)

jobs:

  # ── Resolve the version once for every downstream job ─────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manual="${{ github.event.inputs.version }}"
          v="${manual:-$tag}"
          if [ -z "$v" ]; then echo "Could not resolve a version" >&2; exit 1; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

  # ── Build the base .nupkg in-run (shared) so the clean-room can be fully offline ──
  base:
    needs: meta
    uses: ./.github/workflows/_build-base-dotnet.yml
    with:
      version: ${{ needs.meta.outputs.version }}

  # ── Windows payload: bundle conda libipopt DLL closure ────────────────────
  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Windows via conda-forge, OpenBLAS)
        run: micromamba create -c conda-forge -p C:\ipopt-env ipopt nomkl -y
        shell: pwsh

      - name: Bundle libipopt + dependency closure
        run: |
          pwsh scripts/bundle-native-deps.ps1 `
            -OutputDir staged/runtimes/win-x64/native `
            -SearchDir C:\ipopt-env\Library\bin
        shell: pwsh

      - name: Upload ipopt-payload-win-x64
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-win-x64
          path: staged/

  # ── Linux payload: bundle conda libipopt .so closure (RPATH=$ORIGIN) ──────
  native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell + patchelf
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Linux via conda-forge, OpenBLAS)
        run: micromamba create -c conda-forge -p $HOME/ipopt-env ipopt nomkl -y

      - name: Bundle libipopt + dependency closure
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -OutputDir "$PWD/staged/runtimes/linux-x64/native" \
            -SearchDir "$HOME/ipopt-env/lib"

      - name: Upload ipopt-payload-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-linux-x64
          path: staged/

  # ── macOS payload (per-arch): bundle conda libipopt dylib closure ─────────
  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (native)
            rid: osx-arm64
            subdir: osx-arm64
          - runner: macos-14   # Apple Silicon, cross-fetch the Intel conda closure (no scarce Intel runner)
            rid: osx-x64
            subdir: osx-64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell + micromamba
        run: brew install powershell micromamba

      # --platform lets an arm64 runner solve+download the Intel (osx-64) closure. bundle-native-deps.ps1
      # only inspects/rewrites Mach-O (otool / install_name_tool / codesign) -- never executes it -- so a
      # cross-arch payload assembles fine, and we never depend on GitHub's scarce Intel macOS runners.
      - name: Install IPOPT runtime (macOS via conda-forge, OpenBLAS)
        run: micromamba create --platform ${{ matrix.subdir }} -c conda-forge -p $HOME/ipopt-env ipopt nomkl -y

      - name: Bundle libipopt + dependency closure (@loader_path + ad-hoc sign)
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -OutputDir "$PWD/staged/runtimes/${{ matrix.rid }}/native" \
            -SearchDir "$HOME/ipopt-env/lib"

      - name: Verify nothing resolves outside the package dir
        run: |
          dir="$PWD/staged/runtimes/${{ matrix.rid }}/native"
          for f in "$dir"/*.dylib; do
            echo "== $f =="
            otool -L "$f"
            if otool -L "$f" | tail -n +2 | grep -E '(ipopt-env|/opt/homebrew|/usr/local/miniconda|conda)'; then
              echo "ERROR: $f still references a build-tree path above" >&2
              exit 1
            fi
          done

      - name: Upload ipopt-payload-${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-${{ matrix.rid }}
          path: staged/

  # ── Pack: assemble all RIDs into one self-contained .nupkg ────────────────
  pack:
    needs: [meta, native-windows, native-linux, native-macos]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install SWIG + PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      # The companion packs a ProjectReference to the base, so the base managed assembly must
      # compile -- which needs its generated bindings. No native wrapper is built here.
      - name: Regenerate C# bindings (base managed compile only)
        run: pwsh pagmo.NET/createSwigWrappersAndPlaceThem.ps1

      - name: Download all platform payloads
        uses: actions/download-artifact@v4
        with:
          pattern: ipopt-payload-*
          path: staged-runtimes
          merge-multiple: true

      - name: Show assembled native tree
        run: find staged-runtimes -type f | sort

      - name: Pack
        run: |
          dotnet pack pagmo.NET.ipopt/Pagmo.NET.Ipopt.csproj -c Release \
            -p:Version=${{ needs.meta.outputs.version }} \
            -p:PagmoNativePackDir="$PWD/staged-runtimes" \
            -o artifacts

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/Pagmo.NET.Ipopt.*.nupkg

  # ── Clean-room gate: consume the published-shaped packages, no dev tools, OFFLINE ────
  # Stages BOTH the base (built in-run) and the companion into one local feed; the nuget.config
  # sees ONLY that feed, so a real IPOPT solve runs with no NuGet.org, no conda, no LD/DYLD hints
  # -- proving base + companion end-to-end without publishing anything.
  cleanroom:
    needs: [meta, base, pack]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: macos-14
            rid: osx-arm64
          # No osx-x64 clean-room leg: GitHub's Intel macOS runners are scarce/queue-limited, and the
          # x64 payload is cross-fetched + shipped by the build. Native-Intel RUNTIME validation is
          # deferred (manual / a 1.0.x point release if an Intel-only issue ever surfaces).
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download companion nupkg into the local feed
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: localfeed

      - name: Download base nupkg into the same local feed
        uses: actions/download-artifact@v4
        with:
          name: base-package
          path: localfeed

      - name: Configure clean-room to see ONLY the local feed (base + companion)
        working-directory: pagmo.NET.ipopt/cleanroom
        shell: bash
        run: |
          cat > nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="localfeed" value="../../localfeed" />
            </packageSources>
          </configuration>
          EOF

      # Negative control FIRST: with only the base package (no companion, no system libipopt), IPOPT
      # must be UNavailable. This proves the runner is genuinely clean, so the positive PASS below
      # can't be a false pass from an ambient/leaked libipopt.
      - name: Negative control — base only, IPOPT must be unavailable
        working-directory: pagmo.NET.ipopt/cleanroom
        shell: bash
        env:
          PAGMONET_CLEANROOM_EXPECT: absent
        run: |
          dotnet add CleanRoom.csproj package Pagmo.NET --version "${{ needs.meta.outputs.version }}"
          dotnet run --project CleanRoom.csproj -c Release -r ${{ matrix.rid }} --self-contained false

      - name: Add companion + run IPOPT solve (offline — no NuGet.org, no conda, no LD/DYLD hints)
        working-directory: pagmo.NET.ipopt/cleanroom
        shell: bash
        run: |
          dotnet add CleanRoom.csproj package Pagmo.NET.Ipopt --version "${{ needs.meta.outputs.version }}"
          dotnet run --project CleanRoom.csproj -c Release -r ${{ matrix.rid }} --self-contained false

  # ── Publish: only after the clean-room gate passes ────────────────────────
  publish:
    needs: [meta, pack, cleanroom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts

      - name: Create or update GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSET="artifacts/Pagmo.NET.Ipopt.${{ needs.meta.outputs.version }}.nupkg"
          # Shared single Release per tag; create if we're first, else just attach our asset.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "pagmoNet $TAG" \
              --notes-file pagmo.NET/RELEASE_NOTES.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to NuGet.org
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          dotnet nuget push artifacts/Pagmo.NET.Ipopt.${{ needs.meta.outputs.version }}.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
