name: Build and Test (PagmoNet4j.ipopt)

on:
  push:
    branches: [main]
    paths:
      - 'native/**'
      - 'swig/**'
      - 'ports/**'
      - 'triplets/**'
      - 'scripts/**'
      - 'PagmoNet4j/**'
      - 'PagmoNet4j.ipopt/**'
      - '.github/workflows/build-java-ipopt.yml'
  pull_request:
    branches: [main]
    paths:
      - 'native/**'
      - 'swig/**'
      - 'ports/**'
      - 'triplets/**'
      - 'scripts/**'
      - 'PagmoNet4j/**'
      - 'PagmoNet4j.ipopt/**'
      - '.github/workflows/build-java-ipopt.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# The IPOPT companion scenario is: the base PagmoNet4j (which contains the `ipopt` algorithm,
# loaded at runtime via dlopen -- no IPOPT is linked) PLUS a libipopt on the load path. This
# workflow builds the base native exactly like build-java.yml and runs the base tests WITH a
# conda-forge libipopt present, so the ipopt availability probe reports true and any ipopt
# tests actually exercise the solver. It does NOT set PAGMONET4J_BASE_VERIFY (that flag turns
# on the "IPOPT is absent" assertion, which is only valid for the libipopt-free base build).
# The pagmonet4j-ipopt payload jar packaging is validated by the release / clean-room jobs.

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install SWIG
        run: choco install swig --yes
        shell: pwsh

      - name: Regenerate SWIG Java bindings
        run: |
          New-Item -ItemType Directory -Force -Path "PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j" | Out-Null
          New-Item -ItemType Directory -Force -Path "PagmoNet4j/pagmoWrapper/generated" | Out-Null
          swig -java -c++ `
            -package "io.github.pagmonet.pagmonet4j" `
            -outdir "PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j" `
            -o "PagmoNet4j/pagmoWrapper/generated/pagmonet4j_wrap.cxx" `
            -Iswig `
            -Inative `
            swig/Pagmo4jSwigInterface.i
        shell: pwsh

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth 1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-java-ipopt-v3-${{ hashFiles('ports/**', 'triplets/**', 'PagmoNet4j/pagmoWrapper/CMakeLists.txt', 'scripts/build-native.ps1', 'PagmoNet4j/scripts/build-native.ps1') }}
          restore-keys: vcpkg-windows-java-ipopt-v3-

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Windows via conda-forge)
        run: micromamba create -c conda-forge -p C:\ipopt-env ipopt -y
        shell: pwsh

      - name: Build base native (no IPOPT link; libipopt is dlopen'd at test time)
        run: pwsh PagmoNet4j/scripts/build-native.ps1 -Configuration Release
        shell: pwsh

      - name: Run tests (with libipopt on PATH)
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/PagmoNet4j/pagmoWrapper/win-build
        run: |
          $env:PATH = "C:\ipopt-env\Library\bin;$env:PATH"
          ./gradlew :core:test :kotlin-ext:test --stacktrace
        working-directory: PagmoNet4j
        shell: pwsh

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential swig curl zip unzip tar \
            autoconf autoconf-archive automake libtool powershell

      - name: Regenerate SWIG Java bindings
        run: |
          mkdir -p PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j
          mkdir -p PagmoNet4j/pagmoWrapper/generated
          swig -java -c++ \
            -package "io.github.pagmonet.pagmonet4j" \
            -outdir "PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j" \
            -o "PagmoNet4j/pagmoWrapper/generated/pagmonet4j_wrap.cxx" \
            -Iswig \
            -Inative \
            swig/Pagmo4jSwigInterface.i

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-linux-java-ipopt-v3-${{ hashFiles('ports/**', 'triplets/**', 'PagmoNet4j/pagmoWrapper/CMakeLists.txt', 'scripts/build-native.ps1', 'PagmoNet4j/scripts/build-native.ps1') }}
          restore-keys: vcpkg-linux-java-ipopt-v3-

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Linux via conda-forge)
        run: micromamba create -c conda-forge -p $HOME/ipopt-env ipopt -y

      - name: Build base native (no IPOPT link; libipopt is dlopen'd at test time)
        run: pwsh PagmoNet4j/scripts/build-native.ps1 -Configuration Release

      - name: Run tests (with libipopt on the loader path)
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/PagmoNet4j/pagmoWrapper/build
        run: |
          chmod +x gradlew
          export LD_LIBRARY_PATH="$HOME/ipopt-env/lib:$LD_LIBRARY_PATH"
          ./gradlew :core:test :kotlin-ext:test --stacktrace
        working-directory: PagmoNet4j

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install build tools
        run: brew install autoconf autoconf-archive automake libtool swig powershell micromamba

      - name: Create libm.tbd stub for Xcode 16.4+
        run: |
          SDK=$(xcrun --show-sdk-path 2>/dev/null || true)
          if [ -n "$SDK" ] && [ ! -f "$SDK/usr/lib/libm.tbd" ]; then
            printf '--- !tapi-tbd\ntbd-version: 4\ntargets: [ arm64-apple-macos14.0, x86_64-apple-macos14.0 ]\ninstall-name: /usr/lib/libm.dylib\n...\n' \
              | sudo tee "$SDK/usr/lib/libm.tbd" > /dev/null 2>&1 || true
          fi

      - name: Install IPOPT runtime (macOS via conda-forge)
        run: micromamba create -c conda-forge -p $HOME/ipopt-env mumps-seq ipopt -y

      - name: Regenerate SWIG Java bindings
        run: |
          mkdir -p PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j
          mkdir -p PagmoNet4j/pagmoWrapper/generated
          swig -java -c++ \
            -package "io.github.pagmonet.pagmonet4j" \
            -outdir "PagmoNet4j/core/src/generated/java/io/github/pagmonet/pagmonet4j" \
            -o "PagmoNet4j/pagmoWrapper/generated/pagmonet4j_wrap.cxx" \
            -Iswig \
            -Inative \
            swig/Pagmo4jSwigInterface.i

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-macos-java-ipopt-v3-${{ hashFiles('ports/**', 'triplets/**', 'PagmoNet4j/pagmoWrapper/CMakeLists.txt', 'scripts/build-native.ps1', 'PagmoNet4j/scripts/build-native.ps1') }}
          restore-keys: vcpkg-macos-java-ipopt-v3-

      - name: Build base native (no IPOPT link; libipopt is dlopen'd at test time)
        run: pwsh PagmoNet4j/scripts/build-native.ps1 -Configuration Release

      - name: Run tests (with libipopt on the loader path)
        env:
          PAGMO4J_NATIVE_DIR: ${{ github.workspace }}/PagmoNet4j/pagmoWrapper/build
        run: |
          chmod +x gradlew
          export DYLD_LIBRARY_PATH="$HOME/ipopt-env/lib:$(pwd)/PagmoNet4j/pagmoWrapper/build:$DYLD_LIBRARY_PATH"
          ./gradlew :core:test :kotlin-ext:test --stacktrace
        working-directory: PagmoNet4j
