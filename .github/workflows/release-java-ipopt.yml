name: Publish (PagmoNet4j.ipopt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Build, bundle, assemble and clean-room test, but skip GitHub Release and package publish'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# PagmoNet4j.ipopt is a PURE, EPL-2.0 NATIVE PAYLOAD (the Java twin of Pagmo.NET.Ipopt): it ships
# libipopt and its dependency closure (MUMPS/OpenBLAS/gfortran runtime) under natives/<rid>, and
# NOTHING else. No pagmo, no Java, no JNI wrapper -- the base pagmonet4j artifact carries the
# `ipopt` algorithm, which loads this libipopt at runtime via dlopen; its NativeLoader extracts
# this payload's natives/<rid> closure from the classpath. So this release builds NO native
# wrapper and needs NO vcpkg/SWIG/IPOPT toolchain: each platform job just assembles conda-forge's
# libipopt closure (bundle-native-deps.ps1), the pack job bundles them into one JAR, and the
# clean-room gate proves base + companion together solve HS71 on a machine with no dev tools and
# no conda.
#
# SELF-CONTAINED / OFFLINE GATE: the clean-room proves base + companion together, so it needs a
# real base artifact. Rather than require the base to be published first, this workflow builds the
# base in the same run via the shared _build-base-java.yml reusable workflow and stages it into the
# same local maven repo as the companion. The clean-room resolves BOTH from that local repo (no
# GitHub Packages), so a dry-run publishes nothing yet still proves the whole stack end-to-end.
# (nomkl forces OpenBLAS instead of MKL for a small closure.)

jobs:

  # ── Resolve the version once for every downstream job ─────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manual="${{ github.event.inputs.version }}"
          v="${manual:-$tag}"
          if [ -z "$v" ]; then echo "Could not resolve a version" >&2; exit 1; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

  # ── Build the base JAR in-run (shared) so the clean-room can be fully offline ──
  base:
    needs: meta
    uses: ./.github/workflows/_build-base-java.yml
    with:
      version: ${{ needs.meta.outputs.version }}

  # ── Windows payload: bundle conda libipopt DLL closure ────────────────────
  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Windows via conda-forge, OpenBLAS)
        run: micromamba create -c conda-forge -p C:\ipopt-env ipopt nomkl -y
        shell: pwsh

      - name: Bundle libipopt + dependency closure
        run: |
          pwsh scripts/bundle-native-deps.ps1 `
            -OutputDir staged/win-x64 `
            -SearchDir C:\ipopt-env\Library\bin
        shell: pwsh

      - name: Upload ipopt-payload-win-x64
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-win-x64
          path: staged/

  # ── Linux payload: bundle conda libipopt .so closure (RPATH=$ORIGIN) ──────
  native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell + patchelf
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          init-shell: 'none'
          generate-run-shell: 'false'

      - name: Install IPOPT runtime (Linux via conda-forge, OpenBLAS)
        run: micromamba create -c conda-forge -p $HOME/ipopt-env ipopt nomkl -y

      - name: Bundle libipopt + dependency closure
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -OutputDir "$PWD/staged/linux-x64" \
            -SearchDir "$HOME/ipopt-env/lib"

      - name: Upload ipopt-payload-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-linux-x64
          path: staged/

  # ── macOS payload (per-arch): bundle conda libipopt dylib closure ─────────
  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            rid: osx-arm64
          - runner: macos-13   # Intel
            rid: osx-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell + micromamba
        run: brew install powershell micromamba

      - name: Install IPOPT runtime (macOS via conda-forge, OpenBLAS)
        run: micromamba create -c conda-forge -p $HOME/ipopt-env ipopt nomkl -y

      - name: Bundle libipopt + dependency closure (@loader_path + ad-hoc sign)
        run: |
          pwsh scripts/bundle-native-deps.ps1 \
            -OutputDir "$PWD/staged/${{ matrix.rid }}" \
            -SearchDir "$HOME/ipopt-env/lib"

      - name: Verify nothing resolves outside the package dir
        run: |
          dir="$PWD/staged/${{ matrix.rid }}"
          for f in "$dir"/*.dylib; do
            echo "== $f =="
            otool -L "$f"
            if otool -L "$f" | tail -n +2 | grep -E '(ipopt-env|/opt/homebrew|/usr/local/miniconda|conda)'; then
              echo "ERROR: $f still references a build-tree path above" >&2
              exit 1
            fi
          done

      - name: Upload ipopt-payload-${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: ipopt-payload-${{ matrix.rid }}
          path: staged/

  # ── Pack: assemble all RIDs into one self-contained payload JAR ────────────
  pack:
    needs: [meta, native-windows, native-linux, native-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The payload JAR has no Java source and records the base as a POM dependency only, so it
      # needs neither SWIG nor the base artifact to assemble. staged-natives/<rid>/ is read by
      # PagmoNet4j.ipopt/build.gradle.kts (rootProject dir) and bundled into natives/<rid>/.
      - name: Download all platform payloads
        uses: actions/download-artifact@v4
        with:
          pattern: ipopt-payload-*
          path: PagmoNet4j.ipopt/staged-natives
          merge-multiple: true

      - name: Show assembled native tree
        run: find PagmoNet4j.ipopt/staged-natives -type f | sort

      - name: Assemble payload JAR + publish to local file repo (for the clean-room gate)
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -x test \
            -Pversion=${{ needs.meta.outputs.version }} \
            publishMavenPublicationToBuildLocalRepository
        working-directory: PagmoNet4j.ipopt

      - name: Show published artifact
        run: find PagmoNet4j.ipopt/build/localrepo -type f | sort

      - name: Upload payload JAR (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: package-final
          path: PagmoNet4j.ipopt/build/libs/pagmonet4j-ipopt-*.jar

      - name: Upload local maven repo (for the clean-room gate)
        uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: PagmoNet4j.ipopt/build/localrepo/

  # ── Clean-room gate: consume the published-shaped JARs, no dev tools, OFFLINE ────
  # Stages BOTH the base (built in-run) and the companion into one local maven repo; the clean-room
  # resolves both from there, so a real IPOPT solve runs with no GitHub Packages, no
  # PAGMO4J_NATIVE_DIR and no conda -- proving base + companion end-to-end without publishing anything.
  cleanroom:
    needs: [meta, base, pack]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: macos-14
            rid: osx-arm64
          - runner: macos-13
            rid: osx-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download the companion maven repo
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: localrepo

      - name: Download the base maven repo into the same local repo
        uses: actions/download-artifact@v4
        with:
          name: base-maven-repo
          path: localrepo

      # Negative control FIRST: with only the base pagmonet4j on the classpath (no companion, no
      # system libipopt), IPOPT must be UNavailable -- proves the runner is genuinely clean, so the
      # positive PASS below can't be a false pass from an ambient/leaked libipopt.
      - name: Negative control — base only, IPOPT must be unavailable
        shell: bash
        env:
          PAGMONET_CLEANROOM_EXPECT: absent
        run: |
          chmod +x PagmoNet4j.ipopt/gradlew
          ./PagmoNet4j.ipopt/gradlew --no-daemon -p PagmoNet4j.ipopt/cleanroom run \
            -PpagmoIpoptVersion=${{ needs.meta.outputs.version }} -PpagmoBaseOnly=true

      - name: Resolve pagmonet4j-ipopt + base, run IPOPT solve (offline — no GitHub Packages, no conda)
        shell: bash
        run: |
          ./PagmoNet4j.ipopt/gradlew --no-daemon -p PagmoNet4j.ipopt/cleanroom run \
            -PpagmoIpoptVersion=${{ needs.meta.outputs.version }}

  # ── Publish: only after the clean-room gate passes ────────────────────────
  publish:
    needs: [meta, pack, cleanroom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Re-stage the natives so the published JAR carries the payload (a fresh job has no
      # staged-natives from the pack job).
      - name: Download all platform payloads
        uses: actions/download-artifact@v4
        with:
          pattern: ipopt-payload-*
          path: PagmoNet4j.ipopt/staged-natives
          merge-multiple: true

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "PagmoNet4j.ipopt ${{ github.ref_name }}" \
            --notes-file PagmoNet4j.ipopt/CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish payload JAR to GitHub Packages
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -x test \
            -Pversion=${{ needs.meta.outputs.version }} \
            publishMavenPublicationToGitHubPackagesRepository
        working-directory: PagmoNet4j.ipopt
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
