name: Publish (PagmoNet4j)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0-beta.6) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Assemble fat JAR but skip publishing to GitHub Packages'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Resolve the version once for every downstream job ─────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          if [ -z "$v" ]; then
            echo "::error::No version resolved — provide the 'version' input for manual runs."
            exit 1
          fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

  # ── Build the base JNI wrapper for every RID + assemble the base JAR (shared) ──
  base:
    needs: meta
    uses: ./.github/workflows/_build-base-java.yml
    with:
      version: ${{ needs.meta.outputs.version }}

  # ── Clean-room gate: consume the published-shaped base JAR, no dev tools ───
  cleanroom:
    needs: [meta, base]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: macos-14
            rid: osx-arm64
          - runner: macos-13
            rid: osx-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download the published-shaped maven repo
        uses: actions/download-artifact@v4
        with:
          name: base-maven-repo
          path: localrepo

      - name: Resolve pagmonet4j + run NLopt solve (no PAGMO4J_NATIVE_DIR, no conda)
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -p PagmoNet4j/cleanroom run \
            -PpagmoVersion=${{ needs.meta.outputs.version }}

  # ── Publish: only after the clean-room gate passes ────────────────────────
  publish:
    needs: [meta, base, cleanroom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install SWIG
        run: sudo apt-get update && sudo apt-get install -y swig

      - name: Regenerate SWIG Java bindings
        run: |
          mkdir -p PagmoNet4j/core/src/generated/java/io/github/samthegliderpilot/pagmonet4j
          mkdir -p PagmoNet4j/pagmoWrapper/generated
          swig -java -c++ \
            -package "io.github.samthegliderpilot.pagmonet4j" \
            -outdir "PagmoNet4j/core/src/generated/java/io/github/samthegliderpilot/pagmonet4j" \
            -o "PagmoNet4j/pagmoWrapper/generated/pagmonet4j_wrap.cxx" \
            -Iswig \
            -Inative \
            swig/Pagmo4jSwigInterface.i

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: PagmoNet4j/pagmoWrapper/win-build/

      - uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: PagmoNet4j/pagmoWrapper/build/

      - uses: actions/download-artifact@v4
        with:
          name: native-macos-universal
          path: PagmoNet4j/pagmoWrapper/build/

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: ./gradlew :core:publish :kotlin-ext:publish -x test -Pversion=${{ needs.meta.outputs.version }}
        working-directory: PagmoNet4j
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
